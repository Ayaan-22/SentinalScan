name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint, security scan, tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx respx ruff bandit

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Security scan (bandit)
        run: bandit -r backend/app/ -ll --skip B101

      - name: Run tests
        env:
          SENTINAL_API_KEY: ${{ secrets.SENTINAL_API_KEY || 'ci_test_key_abcdefghijklmnop12345678' }}
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint, type-check, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint (ESLint)
        run: cd frontend && npm run lint --if-present

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_API_URL: http://localhost:8000/api/v1
          VITE_WS_URL: ws://localhost:8000
